<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HollowQuest - Unblocked Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HollowQuest</h1>
            <div class="nav">
                <button class="nav-btn active" data-view="games">Games</button>
                <button class="nav-btn" data-view="proxy">Proxy</button>
            </div>
        </header>
        
        <!-- Games View -->
        <main id="gamesView">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search games...">
            </div>
            
            <div class="categories">
                <button class="cat-btn active" data-cat="all">All</button>
                <button class="cat-btn" data-cat="action">Action</button>
                <button class="cat-btn" data-cat="puzzle">Puzzle</button>
                <button class="cat-btn" data-cat="io">.io</button>
            </div>
            
            <div class="games-grid" id="gamesGrid">
                <!-- Games populate here -->
            </div>
        </main>
        
        <!-- Proxy View -->
        <main id="proxyView" style="display: none;">
            <div class="address-bar">
                <input type="url" id="urlInput" placeholder="https://example.com" value="https://duckduckgo.com">
                <button id="goBtn">Go</button>
            </div>
            <div class="content">
                <iframe id="proxyFrame" src="https://duckduckgo.com" frameborder="0"></iframe>
            </div>
        </main>
        
        <footer>HollowQuest © 2026</footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
